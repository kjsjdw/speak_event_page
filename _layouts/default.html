<!DOCTYPE html>
<html lang="ko">
<head>
  {% include head.html %}
  {% if page.brand_color %}
  <style>
    :root {
      --speak-blue: {{ page.brand_color }};
    }
  </style>
  {% endif %}
<script type="text/javascript" src="//wcs.pstatic.net/wcslog.js"></script>
<script type="text/javascript">
if(!wcs_add) var wcs_add = {};
wcs_add["wa"] = "16d59bb623a2ee0";
if(window.wcs) {
wcs_do();
}
</script>
</head>
<body>
 <a class="skip-link" href="#content">컨텐츠로 건너뛰기</a>
    
  <div class="sticky-header">
    <a href="#cta-top" class="sticky-cta-button">
      👉 스픽 최대 할인 받기
    </a>
  </div>

  <main id="content" class="container">
    <div class="partner-disclaimer" style="background-color: #fff8e1; border-left: 4px solid #ffc107; padding: 14px 18px; margin: 0 0 24px 0; font-size: 0.92rem; line-height: 1.7; color: #5d4e00; border-radius: 4px;">
      <strong style="display: block; margin-bottom: 6px; font-size: 1rem; color: #3d3500;">moon의 영어회화 앱 가이드</strong>
      📢 [본 게시물은 파트너스 활동의 일환으로 소정의 수수료를 받습니다.]<br>
      📢 [본 채널·게시물은 스픽 공식 채널이 아닌 개인 파트너스 활동입니다.]
    </div>
    {{ content }}
  </main>

  {% include footer.html %}
  {%- unless page.url contains "sitemap.xml" -%}
<script>
  if (location.pathname.includes('index.html') || location.pathname.endsWith('/index')) {
    window.history.replaceState(null, '', '/');
  }
</script>
{%- endunless -%}
</body>
</html>
